<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3분 뒤 보스전!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            user-select: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
        }
        canvas {
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <!-- Phaser 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <!-- 캐시 버스터: 코드 변경 시 sed -i '' "s/?v=N/?v=N+1/g" 형식으로 모든 html 일괄 bump -->
    <!-- 데이터 -->
    <script src="js/data/stages/normal.js?v=30"></script>
    <script src="js/data/stages/red.js?v=30"></script>
    <script src="js/data/stages/true_red.js?v=30"></script>
    <script src="js/data/StageData.js?v=30"></script>
    <script src="js/data/StageProgress.js?v=30"></script>
    <script src="js/data/CutsceneData.js?v=30"></script>

    <!-- 엔티티 -->
    <script src="js/entities/PlayerController.js?v=30"></script>
    <script src="js/entities/EnemyManager.js?v=30"></script>
    <script src="js/entities/ItemManager.js?v=30"></script>

    <!-- 씬 파일 -->
    <script src="js/scenes/BootScene.js?v=30"></script>
    <script src="js/scenes/GameScene.js?v=30"></script>
    <script src="js/scenes/TutorialScene.js?v=30"></script>
    <script src="js/scenes/IntroScene.js?v=30"></script>
    <script src="js/scenes/CutsceneScene.js?v=30"></script>
    <script src="js/scenes/StageSelectScene.js?v=30"></script>
    <script src="js/scenes/BossScene.js?v=30"></script>
    <script src="js/scenes/ClearScene.js?v=30"></script>

    <!-- 게임 초기화 -->
    <script src="js/main.js?v=30"></script>
</body>
</html>
