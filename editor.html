<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>적 배치 에디터</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #fff; font-family: monospace; display: flex; height: 100vh; }

        #sidebar {
            width: 240px; background: #16213e; padding: 12px; overflow-y: auto;
            border-right: 2px solid #333;
        }
        #sidebar h2 { font-size: 16px; margin-bottom: 8px; color: #ffd700; }
        #sidebar select, #sidebar button {
            width: 100%; padding: 8px; margin: 4px 0; background: #0f3460;
            color: #fff; border: 1px solid #444; font-family: monospace; cursor: pointer;
        }
        #sidebar button:hover { background: #1a4a8a; }
        .enemy-btn {
            display: block; width: 100%; padding: 10px; margin: 4px 0;
            text-align: left; font-size: 13px; border-radius: 4px;
        }
        .enemy-btn.selected { border: 2px solid #ffd700; background: #2a3a5e; }
        .enemy-btn .preview {
            display: inline-block; width: 16px; height: 16px; margin-right: 8px; vertical-align: middle;
        }

        #canvas-wrap {
            flex: 1; overflow: auto; position: relative; background: #0a0a1a;
        }
        canvas { display: block; cursor: crosshair; }

        #info {
            position: fixed; bottom: 0; left: 240px; right: 0; height: 40px;
            background: #111; display: flex; align-items: center; padding: 0 12px;
            font-size: 13px; color: #888; border-top: 1px solid #333;
        }
        #info span { margin-right: 20px; }

        #output-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 600px; max-height: 80vh; background: #16213e; border: 2px solid #ffd700;
            border-radius: 8px; padding: 16px; z-index: 100;
        }
        #output-panel textarea {
            width: 100%; height: 300px; background: #0a0a1a; color: #4fc3f7;
            border: 1px solid #333; font-family: monospace; font-size: 12px; padding: 8px;
        }
        #overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 99;
        }

        .prop-row { display: flex; align-items: center; margin: 4px 0; font-size: 12px; }
        .prop-row label { width: 70px; color: #aaa; }
        .prop-row input {
            flex: 1; background: #0a0a1a; color: #fff; border: 1px solid #444;
            padding: 4px; font-family: monospace;
        }

        #placed-list { margin-top: 8px; max-height: 200px; overflow-y: auto; }
        .placed-item {
            font-size: 11px; padding: 4px 6px; margin: 2px 0; background: #0f1a2e;
            border-radius: 3px; cursor: pointer; display: flex; justify-content: space-between;
        }
        .placed-item:hover { background: #1a2a4e; }
        .placed-item .del { color: #ff4444; cursor: pointer; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>적 배치 에디터</h2>

        <label style="font-size:12px; color:#aaa;">스테이지:</label>
        <select id="stage-select"></select>

        <hr style="border-color:#333; margin:8px 0;">
        <label style="font-size:12px; color:#aaa;">배치할 적 선택:</label>

        <button class="enemy-btn" data-type="walker" onclick="selectEnemy('walker')">
            <span class="preview" style="background:#ff4444;"></span> 전진형
        </button>
        <button class="enemy-btn" data-type="patrol" onclick="selectEnemy('patrol')">
            <span class="preview" style="background:#ff4444;"></span> 왕복형
        </button>
        <button class="enemy-btn" data-type="jumper" onclick="selectEnemy('jumper')">
            <span class="preview" style="background:#ff8800;"></span> 점프 방해
        </button>
        <button class="enemy-btn" data-type="shooter" onclick="selectEnemy('shooter')">
            <span class="preview" style="background:#8844ff;"></span> 원거리 사격
        </button>
        <button class="enemy-btn" data-type="falling" onclick="selectEnemy('falling')">
            <span class="preview" style="background:#888;"></span> 낙석
        </button>
        <button class="enemy-btn" data-type="spike" onclick="selectEnemy('spike')">
            <span class="preview" style="background:#aa4444;"></span> 솟아나는 가시
        </button>

        <hr style="border-color:#333; margin:8px 0;">
        <label style="font-size:12px; color:#aaa;">선택된 적 속성:</label>
        <div id="props"></div>

        <hr style="border-color:#333; margin:8px 0;">
        <label style="font-size:12px; color:#aaa;">배치된 적 목록:</label>
        <div id="placed-list"></div>

        <hr style="border-color:#333; margin:8px 0;">
        <button onclick="exportData()" style="background:#ffd700; color:#000; font-weight:bold;">📋 데이터 내보내기</button>
        <button onclick="clearAll()" style="background:#ff4444; color:#fff; margin-top:4px;">🗑 전체 삭제</button>
    </div>

    <div id="canvas-wrap">
        <canvas id="editor-canvas"></canvas>
    </div>

    <div id="info">
        <span id="mouse-pos">X: 0, Y: 0</span>
        <span id="cur-enemy">선택: 없음</span>
        <span>클릭: 배치 | 우클릭: 삭제 | 스크롤: 좌우이동</span>
    </div>

    <div id="overlay" onclick="closeOutput()"></div>
    <div id="output-panel">
        <h3 style="color:#ffd700; margin-bottom:8px;">enemies 배열 데이터</h3>
        <p style="font-size:12px; color:#aaa; margin-bottom:8px;">아래 데이터를 복사해서 전달해주세요:</p>
        <textarea id="output-text" readonly></textarea>
        <button onclick="copyOutput()" style="margin-top:8px; background:#4fc3f7; color:#000; padding:8px 16px; border:none; cursor:pointer; font-family:monospace;">📋 복사</button>
        <button onclick="closeOutput()" style="margin-top:8px; margin-left:8px; background:#666; color:#fff; padding:8px 16px; border:none; cursor:pointer;">닫기</button>
    </div>

    <script src="js/data/StageData.js"></script>
    <script>
        const canvas = document.getElementById('editor-canvas');
        const ctx = canvas.getContext('2d');
        const stageSelect = document.getElementById('stage-select');

        let currentStageId = 'normal_1';
        let currentEnemyType = null;
        let placedEnemies = [];
        let selectedPlacedIdx = -1;
        let scrollX = 0;
        let scale = 0.5; // 맵이 크니까 축소

        // 적 기본값
        const ENEMY_DEFAULTS = {
            walker: { speed: 60, dir: 1 },
            patrol: { speed: 80, minX: 0, maxX: 200 },
            jumper: { range: 200 },
            shooter: { interval: 2000 },
            falling: { triggerX: 0 },
            spike: { interval: 3000 },
        };

        // 적 색상
        const ENEMY_COLORS = {
            walker: '#ff4444',
            patrol: '#ff6644',
            jumper: '#ff8800',
            shooter: '#8844ff',
            falling: '#888888',
            spike: '#aa4444',
        };

        const ENEMY_LABELS = {
            walker: '전진', patrol: '왕복', jumper: '점프', shooter: '사격', falling: '낙석', spike: '가시',
        };

        // 스테이지 목록 채우기
        Object.keys(STAGE_DATA).forEach(id => {
            const sd = STAGE_DATA[id];
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = `${sd.era} - ${sd.name} (${id})`;
            stageSelect.appendChild(opt);
        });

        stageSelect.addEventListener('change', () => {
            currentStageId = stageSelect.value;
            // 기존 적 데이터 로드
            const sd = STAGE_DATA[currentStageId];
            placedEnemies = sd.enemies ? JSON.parse(JSON.stringify(sd.enemies)) : [];
            scrollX = 0;
            selectedPlacedIdx = -1;
            updatePlacedList();
            draw();
        });

        // 초기 로드
        const initSd = STAGE_DATA[currentStageId];
        placedEnemies = initSd.enemies ? JSON.parse(JSON.stringify(initSd.enemies)) : [];

        function selectEnemy(type) {
            currentEnemyType = type;
            document.querySelectorAll('.enemy-btn').forEach(b => b.classList.remove('selected'));
            document.querySelector(`[data-type="${type}"]`).classList.add('selected');
            document.getElementById('cur-enemy').textContent = `선택: ${ENEMY_LABELS[type]}`;
            selectedPlacedIdx = -1;
            updateProps();
        }

        function resizeCanvas() {
            const wrap = document.getElementById('canvas-wrap');
            canvas.width = wrap.clientWidth;
            canvas.height = wrap.clientHeight - 40;
            draw();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function draw() {
            const sd = STAGE_DATA[currentStageId];
            const mapW = sd.map.width;
            const mapH = sd.map.height;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.scale(scale, scale);
            ctx.translate(-scrollX, 0);

            // 배경
            ctx.fillStyle = sd.map.backgroundColor;
            ctx.fillRect(0, 0, mapW, mapH);

            // 그리드 (100px 간격)
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let x = 0; x < mapW; x += 100) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, mapH); ctx.stroke();
            }
            for (let y = 0; y < mapH; y += 100) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(mapW, y); ctx.stroke();
            }

            // 플랫폼
            sd.platforms.forEach(p => {
                ctx.fillStyle = '#' + (p.color || sd.map.platformColor).toString(16).padStart(6, '0');
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.strokeRect(p.x, p.y, p.w, p.h);
            });

            // 벽
            if (sd.walls) {
                sd.walls.forEach(w => {
                    ctx.fillStyle = '#' + (sd.map.accentColor).toString(16).padStart(6, '0');
                    ctx.fillRect(w.x, w.y, w.w, w.h);
                });
            }

            // 아이템
            const items = sd.items || (sd.itemPresets ? sd.itemPresets[0] : []);
            if (items) {
                items.forEach(item => {
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ffea00';
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            // 스폰
            ctx.fillStyle = '#4fc3f7';
            ctx.fillRect(sd.spawn.x - 16, sd.spawn.y - 24, 32, 48);
            ctx.fillStyle = '#fff';
            ctx.font = '10px monospace';
            ctx.fillText('SPAWN', sd.spawn.x - 18, sd.spawn.y - 28);

            // 배치된 적
            placedEnemies.forEach((e, idx) => {
                const color = ENEMY_COLORS[e.type] || '#fff';
                const isSelected = idx === selectedPlacedIdx;

                ctx.fillStyle = color;
                ctx.globalAlpha = isSelected ? 1 : 0.8;

                if (e.type === 'spike' || e.type === 'falling') {
                    // 삼각형
                    ctx.beginPath();
                    ctx.moveTo(e.x, e.y - 12);
                    ctx.lineTo(e.x - 12, e.y + 12);
                    ctx.lineTo(e.x + 12, e.y + 12);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // 사각형
                    const s = e.type === 'shooter' ? 15 : 14;
                    ctx.fillRect(e.x - s, e.y - s, s * 2, s * 2);
                }

                // 라벨
                ctx.fillStyle = '#fff';
                ctx.font = '10px monospace';
                ctx.fillText(ENEMY_LABELS[e.type], e.x - 10, e.y - 16);

                // 왕복 범위 표시
                if (e.type === 'patrol' && e.minX !== undefined) {
                    ctx.strokeStyle = color;
                    ctx.globalAlpha = 0.4;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath();
                    ctx.moveTo(e.minX, e.y);
                    ctx.lineTo(e.maxX, e.y);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // 낙석 트리거 표시
                if (e.type === 'falling' && e.triggerX !== undefined) {
                    ctx.strokeStyle = '#ffff00';
                    ctx.globalAlpha = 0.3;
                    ctx.setLineDash([2, 4]);
                    ctx.beginPath();
                    ctx.moveTo(e.triggerX, 0);
                    ctx.lineTo(e.triggerX, mapH);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // 선택 테두리
                if (isSelected) {
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = 1;
                    ctx.strokeRect(e.x - 18, e.y - 18, 36, 36);
                }

                ctx.globalAlpha = 1;
            });

            ctx.restore();
        }

        // 마우스 → 맵 좌표 변환
        function screenToMap(sx, sy) {
            return {
                x: Math.round((sx / scale) + scrollX),
                y: Math.round(sy / scale)
            };
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pos = screenToMap(e.clientX - rect.left, e.clientY - rect.top);
            document.getElementById('mouse-pos').textContent = `X: ${pos.x}, Y: ${pos.y}`;
        });

        // 클릭: 배치
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pos = screenToMap(e.clientX - rect.left, e.clientY - rect.top);

            // 기존 적 클릭 체크
            const clickedIdx = findEnemyAt(pos.x, pos.y);
            if (clickedIdx >= 0) {
                selectedPlacedIdx = clickedIdx;
                currentEnemyType = null;
                document.querySelectorAll('.enemy-btn').forEach(b => b.classList.remove('selected'));
                updateProps();
                updatePlacedList();
                draw();
                return;
            }

            if (!currentEnemyType) return;

            const defaults = { ...ENEMY_DEFAULTS[currentEnemyType] };
            const enemy = { type: currentEnemyType, x: pos.x, y: pos.y, ...defaults };

            // 왕복형 기본 범위
            if (enemy.type === 'patrol') {
                enemy.minX = pos.x - 100;
                enemy.maxX = pos.x + 100;
            }
            // 낙석 기본 트리거
            if (enemy.type === 'falling') {
                enemy.triggerX = pos.x;
            }

            placedEnemies.push(enemy);
            selectedPlacedIdx = placedEnemies.length - 1;
            updateProps();
            updatePlacedList();
            draw();
        });

        // 우클릭: 삭제
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const pos = screenToMap(e.clientX - rect.left, e.clientY - rect.top);
            const idx = findEnemyAt(pos.x, pos.y);
            if (idx >= 0) {
                placedEnemies.splice(idx, 1);
                selectedPlacedIdx = -1;
                updateProps();
                updatePlacedList();
                draw();
            }
        });

        // 스크롤: 좌우 이동
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            scrollX += e.deltaY * 2;
            const sd = STAGE_DATA[currentStageId];
            scrollX = Math.max(0, Math.min(scrollX, sd.map.width - canvas.width / scale));
            draw();
        });

        function findEnemyAt(mx, my) {
            for (let i = placedEnemies.length - 1; i >= 0; i--) {
                const e = placedEnemies[i];
                if (Math.abs(e.x - mx) < 20 && Math.abs(e.y - my) < 20) return i;
            }
            return -1;
        }

        // 속성 패널
        function updateProps() {
            const container = document.getElementById('props');
            container.innerHTML = '';

            if (selectedPlacedIdx < 0) {
                container.innerHTML = '<p style="font-size:11px; color:#555;">적을 선택하거나 배치하세요</p>';
                return;
            }

            const e = placedEnemies[selectedPlacedIdx];
            const fields = [
                { key: 'x', label: 'X' },
                { key: 'y', label: 'Y' },
            ];

            if (e.type === 'walker') {
                fields.push({ key: 'speed', label: '속도' }, { key: 'dir', label: '방향(±1)' });
            } else if (e.type === 'patrol') {
                fields.push({ key: 'speed', label: '속도' }, { key: 'minX', label: '최소X' }, { key: 'maxX', label: '최대X' });
            } else if (e.type === 'jumper') {
                fields.push({ key: 'range', label: '감지거리' });
            } else if (e.type === 'shooter') {
                fields.push({ key: 'interval', label: '발사간격(ms)' });
            } else if (e.type === 'falling') {
                fields.push({ key: 'triggerX', label: '트리거X' });
            } else if (e.type === 'spike') {
                fields.push({ key: 'interval', label: '주기(ms)' });
            }

            fields.forEach(f => {
                const row = document.createElement('div');
                row.className = 'prop-row';
                row.innerHTML = `<label>${f.label}:</label><input type="number" value="${e[f.key] || 0}" data-key="${f.key}">`;
                row.querySelector('input').addEventListener('change', (ev) => {
                    e[f.key] = parseFloat(ev.target.value);
                    draw();
                    updatePlacedList();
                });
                container.appendChild(row);
            });
        }

        // 배치 목록
        function updatePlacedList() {
            const list = document.getElementById('placed-list');
            list.innerHTML = '';
            placedEnemies.forEach((e, i) => {
                const div = document.createElement('div');
                div.className = 'placed-item';
                div.innerHTML = `<span>${ENEMY_LABELS[e.type]} (${e.x}, ${e.y})</span><span class="del" onclick="removeEnemy(${i})">✕</span>`;
                div.addEventListener('click', (ev) => {
                    if (ev.target.classList.contains('del')) return;
                    selectedPlacedIdx = i;
                    // 스크롤 이동
                    scrollX = Math.max(0, e.x * scale - canvas.width / 2);
                    updateProps();
                    draw();
                });
                if (i === selectedPlacedIdx) div.style.background = '#2a3a5e';
                list.appendChild(div);
            });
        }

        function removeEnemy(idx) {
            placedEnemies.splice(idx, 1);
            selectedPlacedIdx = -1;
            updateProps();
            updatePlacedList();
            draw();
        }

        function clearAll() {
            if (confirm('배치된 적을 모두 삭제하시겠습니까?')) {
                placedEnemies = [];
                selectedPlacedIdx = -1;
                updateProps();
                updatePlacedList();
                draw();
            }
        }

        // 내보내기
        function exportData() {
            const lines = placedEnemies.map(e => {
                const parts = [`type: '${e.type}'`, `x: ${e.x}`, `y: ${e.y}`];
                if (e.type === 'walker') {
                    parts.push(`speed: ${e.speed}`, `dir: ${e.dir}`);
                } else if (e.type === 'patrol') {
                    parts.push(`speed: ${e.speed}`, `minX: ${e.minX}`, `maxX: ${e.maxX}`);
                } else if (e.type === 'jumper') {
                    parts.push(`range: ${e.range}`);
                } else if (e.type === 'shooter') {
                    parts.push(`interval: ${e.interval}`);
                } else if (e.type === 'falling') {
                    parts.push(`triggerX: ${e.triggerX}`);
                } else if (e.type === 'spike') {
                    parts.push(`interval: ${e.interval}`);
                }
                return `            { ${parts.join(', ')} },`;
            });

            const output = `        enemies: [\n${lines.join('\n')}\n        ],`;
            document.getElementById('output-text').value = output;
            document.getElementById('output-panel').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function copyOutput() {
            const textarea = document.getElementById('output-text');
            textarea.select();
            document.execCommand('copy');
            alert('복사되었습니다!');
        }

        function closeOutput() {
            document.getElementById('output-panel').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        // 초기 그리기
        updatePlacedList();
        draw();
    </script>
</body>
</html>
