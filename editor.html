<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맵 에디터</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #fff; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: #16213e; padding: 10px; overflow-y: auto; border-right: 2px solid #333; font-size: 12px; }
        #sidebar h2 { font-size: 15px; margin-bottom: 6px; color: #ffd700; }
        #sidebar h3 { font-size: 13px; margin: 8px 0 4px; color: #4fc3f7; border-bottom: 1px solid #333; padding-bottom: 2px; }
        #sidebar select, #sidebar input, #sidebar button {
            width: 100%; padding: 5px; margin: 2px 0; background: #0f3460;
            color: #fff; border: 1px solid #444; font-family: monospace; font-size: 11px;
        }
        #sidebar button { cursor: pointer; }
        #sidebar button:hover { background: #1a4a8a; }
        .row { display: flex; gap: 4px; align-items: center; margin: 2px 0; }
        .row label { width: 50px; color: #aaa; font-size: 11px; flex-shrink: 0; }
        .row input { flex: 1; }
        .tool-btn { display: inline-block; width: 48%; padding: 8px 4px; margin: 1px; text-align: center; border-radius: 3px; font-size: 11px; }
        .tool-btn.selected { border: 2px solid #ffd700 !important; background: #2a3a5e !important; }
        .preview { display: inline-block; width: 12px; height: 12px; margin-right: 4px; vertical-align: middle; }
        #canvas-wrap { flex: 1; overflow: hidden; position: relative; }
        canvas { display: block; }
        #info { position: fixed; bottom: 0; left: 260px; right: 0; height: 32px; background: #111; display: flex; align-items: center; padding: 0 10px; font-size: 11px; color: #888; border-top: 1px solid #333; gap: 15px; }
        .placed-item { font-size: 10px; padding: 3px 5px; margin: 1px 0; background: #0f1a2e; border-radius: 2px; cursor: pointer; display: flex; justify-content: space-between; }
        .placed-item:hover { background: #1a2a4e; }
        .placed-item .del { color: #ff4444; cursor: pointer; padding: 0 4px; }
        #placed-list { max-height: 150px; overflow-y: auto; }
        .big-btn { background: #ffd700 !important; color: #000 !important; font-weight: bold; font-size: 13px !important; padding: 10px !important; }
        .danger-btn { background: #ff4444 !important; color: #fff !important; }
        .play-btn { background: #00cc66 !important; color: #000 !important; font-weight: bold; font-size: 13px !important; padding: 10px !important; }
        #game-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; background: #000; }
        #game-overlay .close-btn { position: fixed; top: 10px; right: 10px; z-index: 101; background: #ff4444; color: #fff; border: none; padding: 8px 16px; cursor: pointer; font-family: monospace; font-size: 14px; }
        #game-container-test { width: 100%; height: 100%; }
        .letter-info { background: #2a2a0a; border: 1px solid #555500; padding: 4px 6px; margin: 4px 0; border-radius: 3px; font-size: 11px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>맵 에디터</h2>

        <h3>스테이지</h3>
        <select id="stage-select"></select>
        <div id="letter-info"></div>

        <h3>맵 크기</h3>
        <div class="row"><label>너비:</label><input type="number" id="map-width" value="4000" step="100"></div>
        <div class="row"><label>높이:</label><input type="number" id="map-height" value="1200" step="100"></div>
        <button onclick="applyMapSize()">맵 크기 적용</button>

        <h3>스폰</h3>
        <div class="row"><label>X:</label><input type="number" id="spawn-x" value="100"></div>
        <div class="row"><label>Y:</label><input type="number" id="spawn-y" value="1120"></div>

        <h3>도구 선택</h3>
        <button class="tool-btn" data-tool="letter" onclick="selectTool('letter')"><span class="preview" style="background:#C8A96E"></span>글자발판</button>
        <button class="tool-btn" data-tool="platform" onclick="selectTool('platform')"><span class="preview" style="background:#5C4833"></span>발판</button>
        <button class="tool-btn" data-tool="moving_h" onclick="selectTool('moving_h')"><span class="preview" style="background:#00aaff"></span>수평이동</button>
        <button class="tool-btn" data-tool="moving_v" onclick="selectTool('moving_v')"><span class="preview" style="background:#00ffaa"></span>수직이동</button>
        <button class="tool-btn" data-tool="wall" onclick="selectTool('wall')"><span class="preview" style="background:#2d4059"></span>벽</button>
        <button class="tool-btn" data-tool="item" onclick="selectTool('item')"><span class="preview" style="background:#ffd700"></span>아이템</button>
        <button class="tool-btn" data-tool="walker" onclick="selectTool('walker')"><span class="preview" style="background:#ff4444"></span>전진적</button>
        <button class="tool-btn" data-tool="patrol" onclick="selectTool('patrol')"><span class="preview" style="background:#ff6644"></span>왕복적</button>
        <button class="tool-btn" data-tool="jumper" onclick="selectTool('jumper')"><span class="preview" style="background:#ff8800"></span>점프적</button>
        <button class="tool-btn" data-tool="shooter" onclick="selectTool('shooter')"><span class="preview" style="background:#8844ff"></span>사격적</button>
        <button class="tool-btn" data-tool="falling" onclick="selectTool('falling')"><span class="preview" style="background:#888"></span>낙석</button>
        <button class="tool-btn" data-tool="spike" onclick="selectTool('spike')"><span class="preview" style="background:#aa4444"></span>가시</button>
        <button class="tool-btn" data-tool="select" onclick="selectTool('select')">선택</button>

        <h3>선택된 속성</h3>
        <div id="props"><span style="color:#555">객체를 클릭하세요</span></div>

        <h3>배치 목록</h3>
        <div id="placed-list"></div>

        <h3 style="margin-top: 10px;">액션</h3>
        <button class="play-btn" onclick="testPlay()">테스트 플레이</button>
        <button class="big-btn" onclick="exportData()" style="margin-top:4px">데이터 내보내기</button>
        <button onclick="importData()" style="margin-top:4px">데이터 불러오기</button>
        <button class="danger-btn" onclick="clearAll()" style="margin-top:4px">전체 삭제</button>
    </div>

    <div id="canvas-wrap">
        <canvas id="editor-canvas"></canvas>
    </div>

    <div id="info">
        <span id="mouse-pos">X: 0, Y: 0</span>
        <span id="cur-tool">도구: 없음</span>
        <span>클릭: 배치 | 우클릭: 삭제 | 스크롤: 이동 | Shift+스크롤: 줌</span>
    </div>

    <!-- 테스트 플레이 오버레이 -->
    <div id="game-overlay">
        <button class="close-btn" onclick="stopTestPlay()">에디터로</button>
        <div id="game-container-test"></div>
    </div>

    <!-- Phaser (테스트용) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="js/data/HangulMaps.js"></script>
    <script src="js/data/StageData.js"></script>
    <script src="js/data/StageProgress.js"></script>
    <script src="js/data/CutsceneData.js"></script>
    <script src="js/entities/PlayerController.js"></script>
    <script src="js/scenes/GameScene.js"></script>

    <script>
    // ==========================================
    // 에디터 상태
    // ==========================================
    let mapW = 4000, mapH = 1200;
    let spawnX = 100, spawnY = 1120;
    let objects = []; // { type, x, y, w, h, ... }
    let letterPlatforms = []; // 글자 플랫폼 (읽기 전용)
    let currentLetterChar = null;
    let currentStageId = null;
    let selectedIdx = -1;
    let currentTool = 'select';
    let scrollX = 0, scrollY = 0;
    let scale = 0.5;
    let isDragging = false;
    let dragStart = null;
    let dragObj = null;       // 오브젝트 드래그 인덱스
    let draggingSpawn = false; // 스폰 드래그 중

    const canvas = document.getElementById('editor-canvas');
    const ctx = canvas.getContext('2d');

    // 색상
    const COLORS = {
        letter: '#C8A96E', platform: '#5C4833', wall: '#2d4059', item: '#ffd700',
        moving_h: '#00aaff', moving_v: '#00ffaa',
        walker: '#ff4444', patrol: '#ff6644', jumper: '#ff8800',
        shooter: '#8844ff', falling: '#888888', spike: '#aa4444',
        spawn: '#4fc3f7', letter: '#C8A96E',
    };

    const LABELS = {
        letter: '글자', platform: '발판', wall: '벽', item: '아이템',
        moving_h: '수평', moving_v: '수직',
        walker: '전진', patrol: '왕복', jumper: '점프',
        shooter: '사격', falling: '낙석', spike: '가시',
    };

    // 기본값
    const DEFAULTS = {
        letter: { w: 200, h: 20 },
        platform: { w: 150, h: 20 },
        wall: { w: 30, h: 270 },
        moving_h: { w: 120, h: 16, distance: 200, speed: 50 },
        moving_v: { w: 120, h: 16, distance: 150, speed: 50 },
        item: { name: '???' },
        walker: { speed: 60, dir: 1 },
        patrol: { speed: 80, minX: 0, maxX: 200 },
        jumper: { range: 200 },
        shooter: { interval: 2000 },
        falling: { triggerX: 0 },
        spike: { interval: 3000 },
    };

    // ==========================================
    // 스테이지 로드
    // ==========================================
    const stageSelect = document.getElementById('stage-select');
    ['normal', 'red', 'true_red'].forEach(route => {
        STAGE_ORDER[route].forEach(id => {
            const sd = STAGE_DATA[id];
            const char = HANGUL_STAGE_CHARS[id] || '';
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = `[${char}] ${sd.era} - ${sd.name} (${id})`;
            stageSelect.appendChild(opt);
        });
    });

    stageSelect.addEventListener('change', () => loadStage(stageSelect.value));

    function loadStage(stageId) {
        const sd = STAGE_DATA[stageId];
        if (!sd) return;

        currentStageId = stageId;
        mapW = sd.map.width;
        mapH = sd.map.height;
        spawnX = sd.spawn.x;
        spawnY = sd.spawn.y;
        objects = [];
        letterPlatforms = [];
        currentLetterChar = sd.letterChar || null;
        selectedIdx = -1;

        document.getElementById('map-width').value = mapW;
        document.getElementById('map-height').value = mapH;
        document.getElementById('spawn-x').value = spawnX;
        document.getElementById('spawn-y').value = spawnY;

        // 글자 플랫폼 생성 (편집 가능한 오브젝트로 로드)
        letterPlatforms = [];
        if (sd.letterChar && typeof generateLetterPlatforms === 'function') {
            const generated = generateLetterPlatforms(sd.letterChar, sd.map.width);
            generated.forEach(p => objects.push({ type: 'letter', x: p.x, y: p.y, w: p.w, h: p.h }));
        }

        // 글자 정보 표시
        const letterInfo = document.getElementById('letter-info');
        if (sd.letterChar) {
            const charInfo = HANGUL_STAGE_CHARS[stageId] || '';
            const letterCount = objects.filter(o => o.type === 'letter').length;
            letterInfo.innerHTML = `<div class="letter-info">글자: <strong style="font-size:18px;color:#C8A96E">${sd.letterChar}</strong> | 글자 플랫폼: ${letterCount}개 (편집 가능)</div>`;
        } else {
            letterInfo.innerHTML = '<div class="letter-info" style="color:#555">글자 미적용 스테이지</div>';
        }

        // 게임플레이 플랫폼
        sd.platforms.forEach(p => objects.push({ type: 'platform', x: p.x, y: p.y, w: p.w, h: p.h }));
        // 벽
        if (sd.walls) sd.walls.forEach(w => objects.push({ type: 'wall', x: w.x, y: w.y, w: w.w, h: w.h }));
        // 이동발판
        if (sd.movingPlatforms) sd.movingPlatforms.forEach(mp => objects.push({
            type: mp.moveType === 'vertical' ? 'moving_v' : 'moving_h',
            x: mp.x, y: mp.y, w: mp.w || 120, h: mp.h || 16,
            distance: mp.distance || 200, speed: mp.speed || 50
        }));
        // 아이템
        const items = sd.items || (sd.itemPresets ? sd.itemPresets[0] : []);
        if (items) items.forEach(it => objects.push({ type: 'item', x: it.x, y: it.y, name: it.name || '???' }));
        // 적
        if (sd.enemies) sd.enemies.forEach(e => {
            const obj = { type: e.type, x: e.x, y: e.y };
            Object.keys(e).forEach(k => { if (k !== 'type' && k !== 'x' && k !== 'y') obj[k] = e[k]; });
            objects.push(obj);
        });

        scrollX = 0; scrollY = 0;
        updateList();
        draw();
    }

    // 초기 로드
    loadStage('normal_1');

    // ==========================================
    // 캔버스
    // ==========================================
    function resizeCanvas() {
        const wrap = document.getElementById('canvas-wrap');
        canvas.width = wrap.clientWidth;
        canvas.height = wrap.clientHeight - 32;
        draw();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function screenToMap(sx, sy) {
        return { x: Math.round(sx / scale + scrollX), y: Math.round(sy / scale + scrollY) };
    }

    function mapToScreen(mx, my) {
        return { x: (mx - scrollX) * scale, y: (my - scrollY) * scale };
    }

    // ==========================================
    // 그리기
    // ==========================================
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.scale(scale, scale);
        ctx.translate(-scrollX, -scrollY);

        // 배경
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, mapW, mapH);

        // 그리드
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 1;
        for (let x = 0; x < mapW; x += 100) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, mapH); ctx.stroke(); }
        for (let y = 0; y < mapH; y += 100) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(mapW, y); ctx.stroke(); }

        // 한글 맵 그리드 (글자 있는 경우)
        if (currentLetterChar) {
            const cellSize = mapW / 15;
            ctx.strokeStyle = 'rgba(200,169,110,0.08)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 15; i++) {
                ctx.beginPath(); ctx.moveTo(i * cellSize, 0); ctx.lineTo(i * cellSize, mapH); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * cellSize); ctx.lineTo(mapW, i * cellSize); ctx.stroke();
            }
        }

        // 맵 경계
        ctx.strokeStyle = '#ff4444';
        ctx.lineWidth = 3;
        ctx.strokeRect(0, 0, mapW, mapH);

        // 플레이 불가 영역 (맵 바깥) 빗금 표시
        const margin = 500;
        ctx.fillStyle = 'rgba(255,0,0,0.08)';
        ctx.fillRect(-margin, -margin, mapW + margin * 2, margin);           // 위
        ctx.fillRect(-margin, mapH, mapW + margin * 2, margin);              // 아래
        ctx.fillRect(-margin, 0, margin, mapH);                               // 왼쪽
        ctx.fillRect(mapW, 0, margin, mapH);                                  // 오른쪽

        // 빗금 패턴
        ctx.strokeStyle = 'rgba(255,0,0,0.15)';
        ctx.lineWidth = 1;
        const step = 40;
        // 위쪽
        for (let i = -margin; i < mapW + margin; i += step) {
            ctx.beginPath(); ctx.moveTo(i, -margin); ctx.lineTo(i + margin, 0); ctx.stroke();
        }
        // 아래쪽
        for (let i = -margin; i < mapW + margin; i += step) {
            ctx.beginPath(); ctx.moveTo(i, mapH); ctx.lineTo(i + margin, mapH + margin); ctx.stroke();
        }
        // 왼쪽
        for (let i = -margin; i < mapH; i += step) {
            ctx.beginPath(); ctx.moveTo(-margin, i); ctx.lineTo(0, i + margin); ctx.stroke();
        }
        // 오른쪽
        for (let i = -margin; i < mapH; i += step) {
            ctx.beginPath(); ctx.moveTo(mapW, i); ctx.lineTo(mapW + margin, i + margin); ctx.stroke();
        }

        // 낙사 영역 (맵 아래 300px, 실제 physics bounds)
        ctx.fillStyle = 'rgba(255,0,0,0.05)';
        ctx.fillRect(0, mapH, mapW, 300);
        ctx.strokeStyle = 'rgba(255,100,0,0.3)';
        ctx.setLineDash([6, 6]);
        ctx.beginPath(); ctx.moveTo(0, mapH + 300); ctx.lineTo(mapW, mapH + 300); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255,100,0,0.5)';
        ctx.font = '12px monospace';
        ctx.fillText('낙사 감지선 (mapH + 300)', 10, mapH + 295);

        // 글자 라벨
        if (currentLetterChar) {
            ctx.fillStyle = 'rgba(200,169,110,0.15)';
            ctx.font = `${mapW * 0.8}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(currentLetterChar, mapW / 2, mapH / 2);
            ctx.textAlign = 'start';
            ctx.textBaseline = 'alphabetic';
        }

        // 스폰 (드래그 가능)
        ctx.fillStyle = draggingSpawn ? '#00ff88' : COLORS.spawn;
        ctx.fillRect(spawnX - 16, spawnY - 24, 32, 48);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(spawnX - 16, spawnY - 24, 32, 48);
        ctx.fillStyle = '#fff';
        ctx.font = '11px monospace';
        ctx.fillText('SPAWN', spawnX - 20, spawnY - 30);
        ctx.font = '9px monospace';
        ctx.fillStyle = '#aaa';
        ctx.fillText(`(${spawnX},${spawnY})`, spawnX - 24, spawnY + 34);

        // 오브젝트 그리기
        objects.forEach((obj, idx) => {
            const isSelected = idx === selectedIdx;
            ctx.globalAlpha = isSelected ? 1 : 0.8;

            switch (obj.type) {
                case 'letter':
                case 'platform':
                case 'wall':
                    ctx.fillStyle = COLORS[obj.type];
                    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                    if (isSelected) { ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.strokeRect(obj.x - 1, obj.y - 1, obj.w + 2, obj.h + 2); }
                    break;

                case 'moving_h':
                case 'moving_v':
                    ctx.fillStyle = COLORS[obj.type];
                    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                    ctx.strokeStyle = COLORS[obj.type];
                    ctx.globalAlpha = 0.3;
                    ctx.setLineDash([4, 4]);
                    if (obj.type === 'moving_h') {
                        ctx.beginPath();
                        ctx.moveTo(obj.x + obj.w / 2 - obj.distance, obj.y + obj.h / 2);
                        ctx.lineTo(obj.x + obj.w / 2 + obj.distance, obj.y + obj.h / 2);
                        ctx.stroke();
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(obj.x + obj.w / 2, obj.y + obj.h / 2 - obj.distance);
                        ctx.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2 + obj.distance);
                        ctx.stroke();
                    }
                    ctx.setLineDash([]);
                    ctx.globalAlpha = isSelected ? 1 : 0.8;
                    if (isSelected) { ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.strokeRect(obj.x - 1, obj.y - 1, obj.w + 2, obj.h + 2); }
                    break;

                case 'item':
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath(); ctx.arc(obj.x, obj.y, 10, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#ffea00';
                    ctx.beginPath(); ctx.arc(obj.x, obj.y, 6, 0, Math.PI * 2); ctx.fill();
                    if (isSelected) { ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.strokeRect(obj.x - 14, obj.y - 14, 28, 28); }
                    break;

                default: // 적
                    ctx.fillStyle = COLORS[obj.type] || '#ff4444';
                    if (obj.type === 'spike' || obj.type === 'falling') {
                        ctx.beginPath(); ctx.moveTo(obj.x, obj.y - 12); ctx.lineTo(obj.x - 12, obj.y + 12); ctx.lineTo(obj.x + 12, obj.y + 12); ctx.closePath(); ctx.fill();
                    } else {
                        ctx.fillRect(obj.x - 14, obj.y - 14, 28, 28);
                    }
                    if (obj.type === 'patrol' && obj.minX != null) {
                        ctx.strokeStyle = COLORS.patrol; ctx.globalAlpha = 0.3; ctx.setLineDash([4, 4]);
                        ctx.beginPath(); ctx.moveTo(obj.minX, obj.y); ctx.lineTo(obj.maxX, obj.y); ctx.stroke();
                        ctx.setLineDash([]); ctx.globalAlpha = isSelected ? 1 : 0.8;
                    }
                    if (isSelected) { ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.strokeRect(obj.x - 18, obj.y - 18, 36, 36); }
                    break;
            }

            // 라벨
            ctx.fillStyle = '#fff';
            ctx.font = '9px monospace';
            ctx.globalAlpha = 0.6;
            const lbl = LABELS[obj.type] || obj.type;
            if (obj.type === 'letter' || obj.type === 'platform' || obj.type === 'wall' || obj.type === 'moving_h' || obj.type === 'moving_v') {
                ctx.fillText(lbl, obj.x + 2, obj.y - 3);
            } else {
                ctx.fillText(lbl, obj.x - 10, obj.y - 18);
            }
            ctx.globalAlpha = 1;
        });

        ctx.restore();
    }

    // ==========================================
    // 입력
    // ==========================================
    function selectTool(tool) {
        currentTool = tool;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('selected'));
        const btn = document.querySelector(`[data-tool="${tool}"]`);
        if (btn) btn.classList.add('selected');
        document.getElementById('cur-tool').textContent = `도구: ${LABELS[tool] || tool}`;
        if (tool !== 'select') selectedIdx = -1;
    }

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const pos = screenToMap(e.clientX - rect.left, e.clientY - rect.top);
        document.getElementById('mouse-pos').textContent = `X: ${pos.x}, Y: ${pos.y}`;

        // 스폰 드래그
        if (draggingSpawn) {
            spawnX = pos.x;
            spawnY = pos.y;
            document.getElementById('spawn-x').value = spawnX;
            document.getElementById('spawn-y').value = spawnY;
            draw();
            return;
        }

        if (isDragging && dragObj != null) {
            objects[dragObj].x = pos.x - (dragStart.ox || 0);
            objects[dragObj].y = pos.y - (dragStart.oy || 0);
            draw();
        }
    });

    canvas.addEventListener('mousedown', (e) => {
        if (e.button === 2) return;
        const rect = canvas.getBoundingClientRect();
        const pos = screenToMap(e.clientX - rect.left, e.clientY - rect.top);

        if (currentTool === 'select') {
            // 스폰 클릭 감지
            if (Math.abs(pos.x - spawnX) < 20 && Math.abs(pos.y - spawnY) < 30) {
                draggingSpawn = true;
                selectedIdx = -1;
                updateProps();
                draw();
                return;
            }

            const idx = findObjectAt(pos.x, pos.y);
            if (idx >= 0) {
                selectedIdx = idx;
                isDragging = true;
                const obj = objects[idx];
                dragObj = idx;
                dragStart = { ox: pos.x - obj.x, oy: pos.y - obj.y };
                updateProps();
                updateList();
                draw();
            } else {
                selectedIdx = -1;
                updateProps();
                draw();
            }
            return;
        }

        // 배치
        const obj = { type: currentTool, x: pos.x, y: pos.y, ...DEFAULTS[currentTool] };
        if (currentTool === 'patrol') { obj.minX = pos.x - 100; obj.maxX = pos.x + 100; }
        if (currentTool === 'falling') { obj.triggerX = pos.x; }
        objects.push(obj);
        selectedIdx = objects.length - 1;
        updateProps();
        updateList();
        draw();
    });

    canvas.addEventListener('mouseup', () => { isDragging = false; dragObj = null; draggingSpawn = false; });

    canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const pos = screenToMap(e.clientX - rect.left, e.clientY - rect.top);
        const idx = findObjectAt(pos.x, pos.y);
        if (idx >= 0) {
            objects.splice(idx, 1);
            selectedIdx = -1;
            updateProps();
            updateList();
            draw();
        }
    });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.shiftKey) {
            scale = Math.max(0.1, Math.min(2, scale - e.deltaY * 0.001));
        } else {
            scrollX += e.deltaX * 2 / scale;
            scrollY += e.deltaY * 2 / scale;
            scrollX = Math.max(0, Math.min(scrollX, mapW - canvas.width / scale));
            scrollY = Math.max(0, Math.min(scrollY, mapH - canvas.height / scale));
        }
        draw();
    });

    function findObjectAt(mx, my) {
        for (let i = objects.length - 1; i >= 0; i--) {
            const obj = objects[i];
            if (obj.w && obj.h) {
                if (mx >= obj.x && mx <= obj.x + obj.w && my >= obj.y && my <= obj.y + obj.h) return i;
            } else {
                if (Math.abs(obj.x - mx) < 20 && Math.abs(obj.y - my) < 20) return i;
            }
        }
        return -1;
    }

    // ==========================================
    // 속성 패널
    // ==========================================
    function updateProps() {
        const container = document.getElementById('props');
        container.innerHTML = '';
        if (selectedIdx < 0) { container.innerHTML = '<span style="color:#555">객체를 클릭하세요</span>'; return; }

        const obj = objects[selectedIdx];
        const fields = [{ key: 'x', label: 'X' }, { key: 'y', label: 'Y' }];

        if (obj.w != null) fields.push({ key: 'w', label: 'W' }, { key: 'h', label: 'H' });
        if (obj.type === 'moving_h' || obj.type === 'moving_v') fields.push({ key: 'distance', label: '거리' }, { key: 'speed', label: '속도' });
        if (obj.type === 'item') fields.push({ key: 'name', label: '이름', isText: true });
        if (obj.type === 'walker') fields.push({ key: 'speed', label: '속도' }, { key: 'dir', label: '방향' });
        if (obj.type === 'patrol') fields.push({ key: 'speed', label: '속도' }, { key: 'minX', label: 'minX' }, { key: 'maxX', label: 'maxX' });
        if (obj.type === 'jumper') fields.push({ key: 'range', label: '거리' });
        if (obj.type === 'shooter') fields.push({ key: 'interval', label: '간격' });
        if (obj.type === 'falling') fields.push({ key: 'triggerX', label: 'trigX' });
        if (obj.type === 'spike') fields.push({ key: 'interval', label: '주기' });

        fields.forEach(f => {
            const row = document.createElement('div');
            row.className = 'row';
            const inputType = f.isText ? 'text' : 'number';
            row.innerHTML = `<label>${f.label}:</label><input type="${inputType}" value="${obj[f.key] || ''}" data-key="${f.key}">`;
            row.querySelector('input').addEventListener('change', (ev) => {
                obj[f.key] = f.isText ? ev.target.value : parseFloat(ev.target.value);
                draw(); updateList();
            });
            container.appendChild(row);
        });
    }

    // ==========================================
    // 배치 목록
    // ==========================================
    function updateList() {
        const list = document.getElementById('placed-list');
        list.innerHTML = '';
        objects.forEach((obj, i) => {
            const div = document.createElement('div');
            div.className = 'placed-item';
            const lbl = LABELS[obj.type] || obj.type;
            div.innerHTML = `<span>${lbl} (${Math.round(obj.x)},${Math.round(obj.y)})</span><span class="del" onclick="removeObj(${i})">x</span>`;
            div.addEventListener('click', (ev) => {
                if (ev.target.classList.contains('del')) return;
                selectedIdx = i;
                currentTool = 'select';
                scrollX = Math.max(0, obj.x - canvas.width / scale / 2);
                scrollY = Math.max(0, obj.y - canvas.height / scale / 2);
                updateProps(); draw();
            });
            if (i === selectedIdx) div.style.background = '#2a3a5e';
            list.appendChild(div);
        });
    }

    function removeObj(idx) {
        objects.splice(idx, 1);
        selectedIdx = -1;
        updateProps(); updateList(); draw();
    }

    function clearAll() {
        if (confirm('전체 삭제? (글자 플랫폼은 유지됩니다)')) { objects = []; selectedIdx = -1; updateProps(); updateList(); draw(); }
    }

    function applyMapSize() {
        mapW = parseInt(document.getElementById('map-width').value) || 4000;
        mapH = parseInt(document.getElementById('map-height').value) || 1200;
        spawnX = parseInt(document.getElementById('spawn-x').value) || 100;
        spawnY = parseInt(document.getElementById('spawn-y').value) || mapH - 80;
        draw();
    }

    // ==========================================
    // 내보내기 / 불러오기
    // ==========================================
    function exportData() {
        const letterPlats = objects.filter(o => o.type === 'letter').map(o => `            { x: ${o.x}, y: ${o.y}, w: ${o.w}, h: ${o.h}, isLetter: true },`);
        const platforms = objects.filter(o => o.type === 'platform').map(o => `            { x: ${o.x}, y: ${o.y}, w: ${o.w}, h: ${o.h} },`);
        const walls = objects.filter(o => o.type === 'wall').map(o => `            { x: ${o.x}, y: ${o.y}, w: ${o.w}, h: ${o.h} },`);
        const movingPlats = objects.filter(o => o.type === 'moving_h' || o.type === 'moving_v').map(o =>
            `            { x: ${o.x}, y: ${o.y}, w: ${o.w}, h: ${o.h}, moveType: '${o.type === 'moving_h' ? 'horizontal' : 'vertical'}', distance: ${o.distance}, speed: ${o.speed} },`
        );
        const items = objects.filter(o => o.type === 'item').map(o => `            { x: ${o.x}, y: ${o.y}, name: '${o.name}' },`);
        const enemies = objects.filter(o => !['platform', 'wall', 'item', 'moving_h', 'moving_v'].includes(o.type)).map(o => {
            const parts = [`type: '${o.type}'`, `x: ${o.x}`, `y: ${o.y}`];
            if (o.type === 'walker') parts.push(`speed: ${o.speed}`, `dir: ${o.dir}`);
            if (o.type === 'patrol') parts.push(`speed: ${o.speed}`, `minX: ${o.minX}`, `maxX: ${o.maxX}`);
            if (o.type === 'jumper') parts.push(`range: ${o.range}`);
            if (o.type === 'shooter') parts.push(`interval: ${o.interval}`);
            if (o.type === 'falling') parts.push(`triggerX: ${o.triggerX}`);
            if (o.type === 'spike') parts.push(`interval: ${o.interval}`);
            return `            { ${parts.join(', ')} },`;
        });

        const sd = STAGE_DATA[currentStageId];
        const letterLine = sd && sd.letterChar ? `\n        letterChar: '${sd.letterChar}',` : '';

        const output = `        map: { width: ${mapW}, height: ${mapH} },${letterLine}
        spawn: { x: ${spawnX}, y: ${spawnY} },
        // 글자 플랫폼 (${letterPlats.length}개)
        // ${letterPlats.length > 0 ? '아래 platforms에 isLetter: true로 포함' : '없음'}
        platforms: [
${letterPlats.join('\n')}
${platforms.join('\n')}
        ],
        walls: [
${walls.join('\n')}
        ],
        movingPlatforms: [
${movingPlats.join('\n')}
        ],
        items: [
${items.join('\n')}
        ],
        enemies: [
${enemies.join('\n')}
        ],`;

        navigator.clipboard.writeText(output).then(() => {
            alert('클립보드에 복사됨!');
        }).catch(() => {
            prompt('데이터 (복사하세요):', output);
        });
    }

    function importData() {
        const json = prompt('JSON 데이터를 붙여넣으세요:');
        if (!json) return;
        try {
            const data = JSON.parse(json);
            objects = data;
            selectedIdx = -1;
            updateProps(); updateList(); draw();
        } catch (e) { alert('JSON 파싱 실패: ' + e.message); }
    }

    // ==========================================
    // 테스트 플레이
    // ==========================================
    let testGame = null;

    function testPlay() {
        spawnX = parseInt(document.getElementById('spawn-x').value) || 100;
        spawnY = parseInt(document.getElementById('spawn-y').value) || mapH - 80;

        const sd = STAGE_DATA[currentStageId];

        const testStage = {
            id: 'test', name: '테스트', era: '테스트', route: 'normal', stageNumber: 0,
            // letterChar 제거: 에디터에서 수동 배치한 글자 플랫폼 사용
            letterChar: null,
            map: {
                width: mapW, height: mapH,
                backgroundColor: (sd && sd.map.backgroundColor) || '#16213e',
                platformColor: (sd && sd.map.platformColor) || 0x3a506b,
                accentColor: (sd && sd.map.accentColor) || 0x2d4059,
                letterColor: (sd && sd.map.letterColor) || 0xC8A96E,
            },
            spawn: { x: spawnX, y: spawnY },
            timeLimit: 180,
            platforms: [
                ...objects.filter(o => o.type === 'letter').map(o => ({ x: o.x, y: o.y, w: o.w, h: o.h, isLetter: true })),
                ...objects.filter(o => o.type === 'platform').map(o => ({ x: o.x, y: o.y, w: o.w, h: o.h })),
            ],
            walls: objects.filter(o => o.type === 'wall').map(o => ({ x: o.x, y: o.y, w: o.w, h: o.h })),
            movingPlatforms: objects.filter(o => o.type === 'moving_h' || o.type === 'moving_v').map(o => ({
                x: o.x, y: o.y, w: o.w, h: o.h,
                moveType: o.type === 'moving_h' ? 'horizontal' : 'vertical',
                distance: o.distance, speed: o.speed
            })),
            items: objects.filter(o => o.type === 'item').map(o => ({ x: o.x, y: o.y, name: o.name || '???' })),
            itemPresets: null,
            enemies: objects.filter(o => !['platform', 'wall', 'item', 'moving_h', 'moving_v'].includes(o.type)).map(o => {
                const e = { type: o.type, x: o.x, y: o.y };
                if (o.speed != null) e.speed = o.speed;
                if (o.dir != null) e.dir = o.dir;
                if (o.minX != null) e.minX = o.minX;
                if (o.maxX != null) e.maxX = o.maxX;
                if (o.range != null) e.range = o.range;
                if (o.interval != null) e.interval = o.interval;
                if (o.triggerX != null) e.triggerX = o.triggerX;
                return e;
            }),
        };

        STAGE_DATA['test'] = testStage;

        document.getElementById('game-overlay').style.display = 'block';

        testGame = new Phaser.Game({
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container-test',
            backgroundColor: '#1a1a2e',
            physics: { default: 'arcade', arcade: { gravity: { y: 800 }, debug: false } },
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: [GameScene],
        });

        testGame.events.once('ready', () => {
            testGame.scene.start('GameScene', { stageId: 'test' });
        });
    }

    function stopTestPlay() {
        if (testGame) {
            testGame.destroy(true);
            testGame = null;
        }
        document.getElementById('game-overlay').style.display = 'none';
        delete STAGE_DATA['test'];
    }
    </script>
</body>
